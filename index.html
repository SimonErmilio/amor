<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestros Meses ❤️</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap");

      /* --- ESTILOS DE CORAZONES FLOTANTES --- */
      @keyframes floatHearts {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 0.8; }
        50% { transform: translateY(50vh) scale(1) translateX(20px); opacity: 0.6; }
        100% { transform: translateY(-10vh) scale(0.5) translateX(-20px); opacity: 0; }
      }

      .heart-particle {
        position: fixed;
        color: rgba(209, 77, 68, 0.4); /* Color de corazones semi-transparente */
        font-size: 1.5rem;
        pointer-events: none; /* No interfieren con los clics */
        z-index: -1; /* Van detrás de todo */
        user-select: none;
      }

      /* Generar varios corazones con diferentes animaciones */
      .heart-particle:nth-child(1) { left: 10%; animation: floatHearts 10s infinite ease-in; animation-delay: 0s; }
      .heart-particle:nth-child(2) { left: 25%; animation: floatHearts 12s infinite ease-in; animation-delay: 2s; }
      .heart-particle:nth-child(3) { left: 40%; animation: floatHearts 9s infinite ease-in; animation-delay: 4s; }
      .heart-particle:nth-child(4) { left: 55%; animation: floatHearts 11s infinite ease-in; animation-delay: 1s; }
      .heart-particle:nth-child(5) { left: 70%; animation: floatHearts 13s infinite ease-in; animation-delay: 3s; }
      .heart-particle:nth-child(6) { left: 85%; animation: floatHearts 10s infinite ease-in; animation-delay: 5s; }
      .heart-particle:nth-child(7) { left: 15%; animation: floatHearts 14s infinite ease-in; animation-delay: 1.5s; font-size: 2rem; }
      .heart-particle:nth-child(8) { left: 60%; animation: floatHearts 12s infinite ease-in; animation-delay: 4.5s; font-size: 1.8rem;}
      .heart-particle:nth-child(9) { left: 80%; animation: floatHearts 10s infinite ease-in; animation-delay: 0.5s; font-size: 1.3rem;}
      .heart-particle:nth-child(10) { left: 35%; animation: floatHearts 13s infinite ease-in; animation-delay: 6s; font-size: 2.2rem;}


      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(to bottom, #fff5f5, #ffecec); /* Fondo rosado suave */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden; /* Evitar scroll horizontal por corazones */
      }

      h1 {
        color: #d14d44;
        text-align: center;
        margin-bottom: 30px;
        font-size: 1.5rem;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        max-width: 800px;
        width: 100%;
        position: relative; /* Para asegurar que está sobre los corazones */
        z-index: 10;
      }

      .gift-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .month-label {
        color: #d14d44;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.8rem;
      }

      .gift {
        background-color: #d14d44;
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        color: white;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        box-shadow: 0 6px 12px rgba(209, 77, 68, 0.2);
        -webkit-tap-highlight-color: transparent;
      }

      .gift:hover {
        transform: scale(1.05);
        background-color: #e15349;
      }

      /* --- MODAL Y CARRUSEL --- */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: white;
        padding: 10px;
        border-radius: 20px;
        max-width: 450px;
        width: 90%;
        text-align: center;
        position: relative;
      }

      .carousel-container {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #000;
        border-radius: 15px;
        overflow: hidden;
      }

      .modal-content img {
        width: 100%;
        max-height: 65vh;
        object-fit: contain;
        display: block;
      }

      .nav-btn {
        position: absolute;
        background: rgba(209, 77, 68, 0.7);
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }

      .prev { left: 5px; }
      .next { right: 5px; }

      .modal-text {
        margin-top: 15px;
        color: #333;
        font-weight: bold;
        padding: 0 10px;
      }

      .close-btn {
        position: absolute;
        top: -45px;
        right: 0;
        color: white;
        font-size: 35px;
        cursor: pointer;
      }

      @media (min-width: 600px) {
        h1 { font-size: 2.2rem; }
        .gift { width: 120px; height: 120px; font-size: 2.5rem; }
        .month-label { font-size: 1rem; }
        .modal-content { padding: 15px; }
        .close-btn { top: -15px; right: -15px; background: #d14d44; border-radius: 50%; width: 35px; height: 35px; font-size: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
      }
    </style>
  </head>
  <body>
    <div class="heart-particle">❤️</div>
    <div class="heart-particle">💖</div>
    <div class="heart-particle">❤️</div>
    <div class="heart-particle">💗</div>
    <div class="heart-particle">❤️</div>
    <div class="heart-particle">💖</div>
    <div class="heart-particle">❤️</div>
    <div class="heart-particle">💗</div>
    <div class="heart-particle">❤️</div>
    <div class="heart-particle">💖</div>

    <h1>Nuestros recuerdos por mes 🎁</h1>

    <div class="grid">
      <div class="gift-container">
        <span class="month-label">Noviembre</span>
        <div class="gift" onclick="openCarousel(['noviembre.jpeg', 'noviembre2.jpeg'], 'Acá empezó todo ❤️')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Diciembre</span>
        <div class="gift" onclick="openCarousel(['diciembre.jpeg', 'diciembre2.jpeg'], 'Este mes los recuerdos son con IA (nos vimos pero no nos sacamos fotos) ❤️')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Enero</span>
        <div class="gift" onclick="openCarousel(['avatar.jpg'], 'Empezando el año juntos (No nos vimos pero si vimos avatar 👽) ✨')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Febrero</span>
        <div class="gift" onclick="openCarousel(['aaaa4.jpeg', 'aaaa5.jpeg', 'aaaa6.jpeg', 'aaaa7.jpeg'], 'El mes del amor, fuimos al rosedal ❤️')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Marzo</span>
        <div class="gift" onclick="openCarousel(['marzo.jpeg'], 'No hay foto pero mi amorcito me compro comida 💕')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Abril</span>
        <div class="gift" onclick="openCarousel(['abril.jpeg', 'abril2.jpeg', 'aaaa.jpeg', 'aaaa2.jpeg', 'aaaa3.jpeg'], 'Fuimos a merendar lemonpie y mi amorcito me saco fotos distraido 🌸')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Mayo</span>
        <div class="gift" onclick="openCarousel(['mayo.jpeg'], '')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Junio</span>
        <div class="gift" onclick="openCarousel(['junio.jpeg'], '')">🎁</div>
      </div>

      <div class="gift-container">
        <span class="month-label">Julio</span>
        <div class="gift" onclick="openCarousel(['julio.jpeg'], '')">🎁</div>
      </div>
    </div>

    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>

        <div class="carousel-container">
          <button class="nav-btn prev" onclick="changeImg(-1)">&#10094;</button>
          <img id="modalImg" src="" alt="Recuerdo" />
          <button class="nav-btn next" onclick="changeImg(1)">&#10095;</button>
        </div>

        <p id="modalText" class="modal-text"></p>
      </div>
    </div>

    <script>
      let currentImages = [];
      let currentIndex = 0;

      function openCarousel(imgs, text) {
        // Filtrar strings vacíos por si acaso
        const validImgs = imgs.filter(img => img.trim() !== "");
        
        if (validImgs.length === 0) {
            alert("Próximamente... " + text);
            return;
        }
        
        currentImages = validImgs;
        currentIndex = 0;

        updateCarousel();
        document.getElementById("modalText").innerText = text;
        document.getElementById("myModal").style.display = "flex";

        const btns = document.querySelectorAll(".nav-btn");
        btns.forEach(
          (btn) => (btn.style.display = currentImages.length > 1 ? "flex" : "none")
        );
      }

      function updateCarousel() {
        document.getElementById("modalImg").src = currentImages[currentIndex];
      }

      function changeImg(step) {
        currentIndex += step;
        if (currentIndex >= currentImages.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = currentImages.length - 1;
        updateCarousel();
      }

      function closeModal() {
        document.getElementById("myModal").style.display = "none";
      }

      window.onclick = function (event) {
        if (event.target == document.getElementById("myModal")) closeModal();
      };
    </script>
  </body>
</html>
